<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" x="0" y="0" viewBox="0 0 1600 760.9" xml:space="preserve" role="img" aria-labelledby="title desc">
  <title id="title">Naimur Reza animated neon profile cover</title>
  <desc id="desc">Illustrator-style glassmorphism cover with animated neon line strokes for GitHub profile README.</desc>

  <style>
    .fontMedium{font-family:'Poppins','Segoe UI',Arial,sans-serif;font-weight:500}.fontBold{font-family:'Poppins','Segoe UI',Arial,sans-serif;font-weight:800}.st28{fill:#5fcae7}.st29{opacity:.9;fill:#f7fbfe;enable-background:new}.st30{font-size:12px}.st31{fill:#be57a1}.st32{fill:#998ac2}
    .waveLine{stroke-dasharray:1200;stroke-dashoffset:1200;animation:drawFlow 6.5s ease-in-out infinite,glowPulse 3.2s ease-in-out infinite;filter:drop-shadow(0 0 5px #5fcae7) drop-shadow(0 0 12px #be57a1)}
    .waveLine:nth-of-type(2n){animation-delay:-.45s}.waveLine:nth-of-type(3n){animation-delay:-.9s}.waveLine:nth-of-type(4n){animation-delay:-1.35s}.waveLine:nth-of-type(5n){animation-delay:-1.8s}
    .thinLine{stroke-dasharray:950;stroke-dashoffset:950;animation:drawFlow 8s ease-in-out infinite,softPulse 4s ease-in-out infinite;filter:drop-shadow(0 0 3px #5fcae7)}
    .floatCard{animation:floatCard 5.5s ease-in-out infinite}.orbitDot{animation:dotPulse 3.2s ease-in-out infinite}.orbitDot:nth-child(2){animation-delay:-.6s}.orbitDot:nth-child(3){animation-delay:-1.2s}.orbitDot:nth-child(4){animation-delay:-1.8s}
    .logoPulse{animation:logoPulse 4s ease-in-out infinite}.cardPulse{animation:cardPulse 5s ease-in-out infinite}
    @keyframes drawFlow{0%{stroke-dashoffset:1200}45%{stroke-dashoffset:0}70%{stroke-dashoffset:0}100%{stroke-dashoffset:-1200}}
    @keyframes glowPulse{0%,100%{opacity:.13}50%{opacity:1}}
    @keyframes softPulse{0%,100%{opacity:.06}50%{opacity:.48}}
    @keyframes dotPulse{0%,100%{opacity:.35;r:4}50%{opacity:1;r:7}}
    @keyframes floatCard{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes logoPulse{0%,100%{opacity:.2}50%{opacity:.42}}
    @keyframes cardPulse{0%,100%{opacity:.72}50%{opacity:.9}}
  </style>

  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="1637.582" x2="1600" y2="877.582" gradientTransform="matrix(1 0 0 -1 0 1638.532)">
      <stop offset="0" stop-color="#0a0c0f"/><stop offset=".52" stop-color="#10141a"/><stop offset="1" stop-color="#0a0c0f"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="486.899" cy="824.574" r="1" gradientTransform="rotate(-18 568520.564 626552.6)scale(455 -175)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#be57a1" stop-opacity=".72"/><stop offset="1" stop-color="#be57a1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="486.986" cy="824.154" r="1" gradientTransform="rotate(-18 632329.197 779032.811)scale(560 -190)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fcae7" stop-opacity=".64"/><stop offset="1" stop-color="#5fcae7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveG" gradientUnits="userSpaceOnUse" x1="0" y1="736" x2="1600" y2="136">
      <stop offset="0" stop-color="#be57a1"><animate attributeName="stop-color" values="#be57a1;#ff27f8;#7563ab;#be57a1" dur="7s" repeatCount="indefinite"/></stop>
      <stop offset=".48" stop-color="#7563ab"><animate attributeName="stop-color" values="#7563ab;#5fcae7;#be57a1;#7563ab" dur="7s" repeatCount="indefinite"/></stop>
      <stop offset="1" stop-color="#5fcae7"><animate attributeName="stop-color" values="#5fcae7;#45b75f;#5fcae7" dur="7s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="cardFill" gradientUnits="userSpaceOnUse" x1="361.884" y1="1471.726" x2="1241.883" y2="1071.726" gradientTransform="matrix(1 0 0 -1 0 1638.532)">
      <stop offset="0" stop-color="#fff" stop-opacity=".24"/><stop offset=".5" stop-color="#fff" stop-opacity=".105"/><stop offset="1" stop-color="#fff" stop-opacity=".055"/>
    </linearGradient>
    <linearGradient id="cardStroke" gradientUnits="userSpaceOnUse" x1="362.33" y1="1471.523" x2="1241.433" y2="1071.931" gradientTransform="matrix(1 0 0 -1 0 1638.532)">
      <stop offset="0" stop-color="#fff" stop-opacity=".72"/><stop offset=".45" stop-color="#be57a1" stop-opacity=".38"/><stop offset="1" stop-color="#5fcae7" stop-opacity=".66"/>
    </linearGradient>
  </defs>

