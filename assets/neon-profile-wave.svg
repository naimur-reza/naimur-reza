<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Naimur Reza animated neon profile cover</title>
  <desc id="desc">Enhanced glassmorphism GitHub cover with pulsing neon wave lines, A logo, and Naimur Reza profile information.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.48" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>

    <linearGradient id="neon" x1="0" y1="890" x2="1920" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff1cf7">
        <animate attributeName="stop-color" values="#ff1cf7;#a855f7;#00f0ff;#ff1cf7" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#00f0ff;#ff1cf7;#8b5cf6" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#00f0ff">
        <animate attributeName="stop-color" values="#00f0ff;#22c55e;#38bdf8;#00f0ff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="cardFill" x1="432" y1="232" x2="1488" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.045"/>
    </linearGradient>

    <linearGradient id="cardBorder" x1="430" y1="230" x2="1490" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="0.5" stop-color="#ff1cf7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0.7"/>
    </linearGradient>

    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(410 845) rotate(-16) scale(600 230)">
      <stop stop-color="#ff1cf7" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff1cf7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 445) rotate(-18) scale(700 260)">
      <stop stop-color="#00f0ff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurGlow" x="-30%" y="-40%" width="160%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23 0 0 0 0 0.9 0 0 0 0 1 0 0 0 0.9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="35" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="cardBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>

    <style>
      .name{font:800 46px 'Segoe UI',Arial,sans-serif;letter-spacing:15px;fill:#f8fafc}
      .role{font:500 40px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb;opacity:.9}
      .stack{font:600 23px 'Segoe UI',Arial,sans-serif;fill:#dbeafe;opacity:.88}
      .meta{font:700 21px 'Segoe UI',Arial,sans-serif;fill:#f8fafc;opacity:.86}
      .tag{font:800 18px 'Segoe UI',Arial,sans-serif;letter-spacing:2px;fill:#9ff7ff}
      .logo{font:900 210px 'Segoe UI',Arial,sans-serif;fill:none;stroke:#ffffff;stroke-width:7;stroke-opacity:.22;letter-spacing:-10px}
      .logoSmall{font:900 72px 'Segoe UI',Arial,sans-serif;fill:#ffffff;opacity:.9}
      .wave{stroke:url(#neon);stroke-width:3.4;fill:none;stroke-linecap:round;filter:url(#blurGlow);opacity:.26;animation:pulse 3s ease-in-out infinite, floatWave 8s ease-in-out infinite}
      .wave:nth-of-type(2n){animation-delay:-.42s}
      .wave:nth-of-type(3n){animation-delay:-.84s}
      .wave:nth-of-type(4n){animation-delay:-1.26s}
      .thread{stroke:url(#neon);stroke-width:2.2;fill:none;stroke-linecap:round;filter:url(#blurGlow);opacity:.18;animation:threadPulse 3.6s ease-in-out infinite}
      .dash{stroke-dasharray:18 22;animation:dash 18s linear infinite}
      .cardFloat{animation:cardFloat 5.8s ease-in-out infinite}
      .blink{animation:blink 1.1s steps(2,end) infinite}
      .orb{animation:orb 3.2s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:.12}50%{opacity:1}}
      @keyframes threadPulse{0%,100%{opacity:.08}50%{opacity:.56}}
      @keyframes floatWave{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
      @keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes dash{to{stroke-dashoffset:-520}}
      @keyframes blink{50%{opacity:.15}}
      @keyframes orb{0%,100%{opacity:.28;r:4}50%{opacity:1;r:8}}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#pinkGlow)" opacity="0.85"/>
  <rect width="1920" height="1080" fill="url(#cyanGlow)" opacity="0.95"/>

  <g opacity="0.13">
    <path d="M0 180H1920M0 300H1920M0 420H1920M0 540H1920M0 660H1920M0 780H1920M0 900H1920" stroke="#94a3b8"/>
    <path d="M160 0V1080M320 0V1080M480 0V1080M640 0V1080M800 0V1080M960 0V1080M1120 0V1080M1280 0V1080M1440 0V1080M1600 0V1080M1760 0V1080" stroke="#94a3b8"/>
  </g>

  <g class="cardFloat" filter="url(#softShadow)">
    <rect x="430" y="230" width="1060" height="620" rx="28" fill="url(#cardFill)" stroke="url(#cardBorder)" stroke-width="2.4"/>
    <rect x="433" y="233" width="1054" height="614" rx="25" fill="#ffffff" fill-opacity="0.035"/>
    <path d="M1156 230V356L1252 452H1156V850" stroke="#ffffff" stroke-opacity="0.11" stroke-width="6"/>
    <path d="M1192 230L1405 443" stroke="#ffffff" stroke-opacity="0.10" stroke-width="5"/>
    <path d="M1210 850L1488 572" stroke="#00f0ff" stroke-opacity="0.08" stroke-width="5"/>

    <text x="470" y="300" class="name">NAIMUR REZA</text>
    <text x="470" y="742" class="role">Full-Stack Web Developer</text>
    <text x="470" y="794" class="stack">Next.js • React • TypeScript • Node.js • MongoDB</text>

    <g transform="translate(470 820)">
      <circle cx="13" cy="13" r="12" fill="#00f0ff" opacity="0.9"/>
      <text x="34" y="20" class="meta">github.com/naimur-reza</text>
      <circle cx="335" cy="13" r="12" fill="#ff1cf7" opacity="0.9"/>
      <text x="356" y="20" class="meta">linkedin.com/in/naimur-reza</text>
      <circle cx="760" cy="13" r="12" fill="#a78bfa" opacity="0.9"/>
      <text x="781" y="20" class="meta">naimur.rezaa@gmail.com</text>
    </g>

    <g transform="translate(1240 348)" opacity="0.95">
      <text x="0" y="172" class="logo">A</text>
      <circle cx="90" cy="92" r="92" stroke="#00f0ff" stroke-opacity="0.18" stroke-width="3" class="dash"/>
      <circle cx="90" cy="92" r="68" stroke="#ff1cf7" stroke-opacity="0.16" stroke-width="3" class="dash"/>
    </g>

    <g transform="translate(1228 742)">
      <rect width="190" height="52" rx="26" fill="#ffffff" fill-opacity="0.08" stroke="#00f0ff" stroke-opacity="0.25"/>
      <text x="27" y="34" class="tag">BUILD • SHIP</text>
    </g>
  </g>

  <g filter="url(#blurGlow)">
    <path class="wave" d="M-120 1080 C 170 930, 260 835, 455 814 C 642 793, 704 920, 890 798 C 1060 686, 1125 552, 1298 550 C 1475 548, 1592 367, 2040 272"/>
    <path class="wave" d="M-120 1045 C 168 900, 278 807, 473 790 C 660 773, 724 892, 904 776 C 1073 667, 1140 530, 1312 529 C 1488 527, 1600 345, 2040 250"/>
    <path class="wave" d="M-120 1010 C 170 871, 296 780, 491 768 C 680 756, 744 865, 920 755 C 1086 650, 1156 510, 1328 509 C 1502 507, 1614 326, 2040 232"/>
    <path class="wave" d="M-120 975 C 176 842, 315 756, 512 748 C 700 740, 765 840, 936 736 C 1102 635, 1174 493, 1345 492 C 1518 491, 1628 307, 2040 214"/>
    <path class="wave" d="M-120 940 C 186 815, 335 733, 533 730 C 722 727, 787 817, 954 718 C 1118 620, 1192 478, 1363 478 C 1534 477, 1642 290, 2040 198"/>
    <path class="wave" d="M-120 905 C 199 790, 356 712, 556 714 C 746 716, 811 796, 974 703 C 1136 610, 1212 466, 1383 466 C 1552 466, 1658 276, 2040 184"/>
    <path class="wave" d="M-120 870 C 215 767, 379 694, 580 702 C 770 710, 837 780, 996 690 C 1156 600, 1233 456, 1404 457 C 1570 459, 1676 264, 2040 171"/>
    <path class="wave" d="M-120 835 C 234 746, 404 678, 606 692 C 796 706, 864 766, 1020 680 C 1177 593, 1256 450, 1427 452 C 1590 454, 1695 254, 2040 160"/>
    <path class="wave" d="M-120 800 C 255 727, 431 665, 634 686 C 824 706, 894 756, 1046 673 C 1201 589, 1281 447, 1452 450 C 1612 454, 1715 247, 2040 151"/>
    <path class="wave" d="M-120 765 C 278 711, 460 656, 664 684 C 854 710, 926 750, 1074 670 C 1226 588, 1308 449, 1479 454 C 1636 459, 1737 244, 2040 145"/>
    <path class="wave" d="M-120 730 C 305 698, 491 651, 696 686 C 886 719, 960 749, 1104 671 C 1254 591, 1336 455, 1508 462 C 1662 468, 1760 245, 2040 143"/>
    <path class="wave" d="M-120 695 C 334 689, 524 651, 730 694 C 920 733, 996 755, 1136 678 C 1285 598, 1368 466, 1540 475 C 1690 483, 1785 251, 2040 145"/>
  </g>

  <g opacity="0.75">
    <path class="thread" d="M80 1080 C 320 900, 520 785, 704 762 C 880 740, 944 820, 1110 742 C 1275 664, 1330 508, 1500 496 C 1650 485, 1760 340, 1920 250"/>
    <path class="thread" d="M215 1080 C 420 925, 590 820, 760 795 C 925 770, 990 840, 1148 772 C 1304 704, 1370 555, 1530 542 C 1680 530, 1780 395, 1920 300"/>
    <path class="thread" d="M350 1080 C 535 955, 670 865, 824 836 C 978 807, 1038 865, 1185 810 C 1335 754, 1404 620, 1557 604 C 1705 588, 1800 465, 1920 365"/>
    <path class="thread" d="M500 1080 C 640 990, 760 918, 892 888 C 1030 856, 1085 898, 1218 850 C 1362 798, 1432 690, 1575 668 C 1716 646, 1810 545, 1920 445"/>
  </g>

  <g opacity="0.95">
    <circle class="orb" cx="278" cy="884" r="4" fill="#ff1cf7"/>
    <circle class="orb" cx="780" cy="804" r="4" fill="#8b5cf6"/>
    <circle class="orb" cx="1298" cy="550" r="4" fill="#00f0ff"/>
    <circle class="orb" cx="1610" cy="335" r="4" fill="#22c55e"/>
  </g>
</svg>
